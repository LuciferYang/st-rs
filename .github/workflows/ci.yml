name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rust:
    name: Rust ${{ matrix.toolchain }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test -p st-rs

      - name: Test (no default features)
        run: cargo test -p st-rs --no-default-features

      - name: Bench compile (smoke check, no run)
        run: cargo bench -p st-rs --no-run

  java:
    name: Java compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Compile Java
        run: cd java && mvn compile -q

  integration:
    name: JNI integration tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Build native library
        run: cargo build -p st-rs-jni

      - name: Run Java integration tests
        run: cd java && mvn test -Djava.library.path=../target/debug

  release-build:
    name: Release build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            lib: libst_rs_jni.so
          - target: aarch64-apple-darwin
            os: macos-latest
            lib: libst_rs_jni.dylib
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release native library
        run: cargo build --release -p st-rs-jni

      - name: Determine platform dir
        id: platform
        run: |
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu) echo "dir=linux-x86_64" >> $GITHUB_OUTPUT ;;
            aarch64-apple-darwin)     echo "dir=osx-aarch64"   >> $GITHUB_OUTPUT ;;
          esac

      - name: Stage native library
        run: |
          mkdir -p native/${{ steps.platform.outputs.dir }}
          cp target/release/${{ matrix.lib }} native/${{ steps.platform.outputs.dir }}/

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: native/

  flink-integration:
    name: Flink integration (MiniCluster)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build native library (debug)
        run: cargo build -p st-rs-jni

      - name: Install st-rs-jni JAR to local Maven repo
        run: cd java && mvn install -DskipTests -q

      - name: Run Flink integration tests
        timeout-minutes: 20
        run: |
          cd java-flink-it && \
          mvn test -Djava.library.path=../target/debug -B

  fat-jar:
    name: Fat JAR (all platforms)
    needs: release-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Download Linux native library
        uses: actions/download-artifact@v4
        with:
          name: native-x86_64-unknown-linux-gnu
          path: java/src/main/resources/org/forstdb/native/

      - name: Download macOS native library
        uses: actions/download-artifact@v4
        with:
          name: native-aarch64-apple-darwin
          path: java/src/main/resources/org/forstdb/native/

      - name: Verify bundled natives
        run: find java/src/main/resources/org/forstdb/native/ -type f

      - name: Build fat JAR
        run: cd java && mvn package -DskipTests -q

      - name: Upload fat JAR
        uses: actions/upload-artifact@v4
        with:
          name: st-rs-jni-fat-jar
          path: java/target/st-rs-jni-0.0.1-SNAPSHOT.jar
